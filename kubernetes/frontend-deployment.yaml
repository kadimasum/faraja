apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: faraja
  labels:
    app: faraja
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: faraja
      tier: frontend
  template:
    metadata:
      labels:
        app: faraja
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: faraja-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://backend-service:8000"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
